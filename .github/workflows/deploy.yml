name: Deploy

on:
  push:
    tags:
      - "release-*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /small-screens-pdx

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
